<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Code Converter</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>AI Code Converter</h1>
            <p>Instantly translate code between programming languages powered by Gemini 1.5</p>
        </header>

        <div class="controls">
            <div class="control-group">
                <label for="source-lang">Source Language (Optional)</label>
                <select id="source-lang">
                    <option value="auto">Auto-Detect</option>
                    <option value="python">Python</option>
                    <option value="javascript">JavaScript</option>
                    <option value="java">Java</option>
                    <option value="cpp">C++</option>
                    <option value="c">C</option>
                    <option value="csharp">C#</option>
                    <option value="go">Go</option>
                    <option value="rust">Rust</option>
                    <option value="php">PHP</option>
                    <option value="ruby">Ruby</option>
                </select>
            </div>
            
            <button id="convert-btn" class="primary-btn">
                <span>Convert Code</span>
                <div class="loader hidden"></div>
            </button>

            <div class="control-group">
                <label for="target-lang">Target Language</label>
                <select id="target-lang">
                    <option value="python">Python</option>
                    <option value="javascript">JavaScript</option>
                    <option value="java">Java</option>
                    <option value="cpp" selected>C++</option>
                    <option value="c">C</option>
                    <option value="csharp">C#</option>
                    <option value="go">Go</option>
                    <option value="rust">Rust</option>
                    <option value="php">PHP</option>
                    <option value="ruby">Ruby</option>
                </select>
            </div>
        </div>

        <div class="editor-container">
            <div class="editor-pane">
                <div class="pane-header">Input Code</div>
                <div id="source-editor" class="monaco-editor-container"></div>
            </div>
            <div class="editor-pane">
                <div class="pane-header">Output Code</div>
                <div id="target-editor" class="monaco-editor-container"></div>
            </div>
        </div>
        
        <div id="error-message" class="error-toast hidden"></div>
    </div>

    <!-- Load Monaco Editor -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/require.js/2.3.6/require.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
